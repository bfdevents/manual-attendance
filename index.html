<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFD Shanghai 26 Check-In/Out</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 50px;
  background-color: #f9f9f9;
}
.logo { max-width: 150px; margin-bottom: 20px; }
h1 { color: #2c3e50; }
p { color: #555; }
input, button { padding: 10px; margin: 10px 0; width: 220px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
button { background-color: #3498db; color: white; border: none; cursor: pointer; }
button:hover { background-color: #2980b9; }
#status { margin-top: 20px; color: green; font-weight: bold; }
</style>
</head>
<body>

<img class="logo" src="https://242329549.fs1.hubspotusercontent-na2.net/hubfs/242329549/crm-properties-file-values/Shanghai%20Final%20Logo.png" alt="BFD Shanghai 26 Logo">

<h1>BFD Shanghai 26 Check-In/Out</h1>
<p id="status">Please enter your name or wait if auto-submitting...</p>

<form id="checkoutForm">
  <input type="text" id="fname" placeholder="First Name" required />
  <input type="text" id="lname" placeholder="Last Name" required />
  <br>
  <button type="submit">Submit</button>
</form>

<script>
const webhookURL = "https://hook.eu1.make.com/pdz3obto9me2epspeq6iyq3yfjh5o1ou"; // Replace with your webhook

// --- Send data to webhook ---
function sendData(auto=false) {
  const fnameInput = document.getElementById('fname');
  const lnameInput = document.getElementById('lname');
  const fname = fnameInput.value.trim();
  const lname = lnameInput.value.trim();

  if(!fname || !lname) return;

  const formattedName = `${fname.charAt(0).toUpperCase()+fname.slice(1).toLowerCase()} ${lname.charAt(0).toUpperCase()+lname.slice(1).toLowerCase()}`;

  document.getElementById('status').textContent = "Submitting...";

  // Read URL parameters for action and day
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action") || "check-out";
  const day = params.get("day") || "1";

  fetch(webhookURL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      fname,
      lname,
      action,
      day,
      source: auto ? "staff-auto" : "staff-manual",
      timestamp: new Date().toISOString()
    })
  })
  .then(() => {
    document.getElementById('status').textContent = `${formattedName} ${action} recorded for day ${day}!`;
    document.getElementById('checkoutForm').style.display = 'none';

    if(auto) {
      setTimeout(() => {
        window.location.href = "https://airtable.com/appJw66wFLvrbTgdX/shr66ErW4qkngZuy7"; // Change redirect if needed
      }, 3000);
    }
  })
  .catch(() => {
    document.getElementById('status').textContent = "Error sending data. Please try again.";
  });
}

// --- Manual submit ---
document.getElementById('checkoutForm').addEventListener('submit', e => {
  e.preventDefault();
  sendData(false);
});

// --- Prefill + Auto-submit ---
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const fname = params.get("prefill_fname");
  const lname = params.get("prefill_lname");
  const auto = params.get("auto");

  console.log("Page Loaded");
  console.log("URL Parameters:", {fname, lname, auto});

  if(fname) document.getElementById('fname').value = fname;
  if(lname) document.getElementById('lname').value = lname;

  if(auto === 'true' && fname && lname) {
    // Wait a short moment to ensure inputs are filled
    setTimeout(() => sendData(true), 300);
  }
});
</script>

</body>
</html>
