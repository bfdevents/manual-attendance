<script>
// --- Send data function ---
function sendData(auto = false) {
  const fnameInput = document.getElementById('fname');
  const lnameInput = document.getElementById('lname');

  const fname = fnameInput.value.trim();
  const lname = lnameInput.value.trim();

  if (!fname || !lname) return;

  const name = `${fname.charAt(0).toUpperCase() + fname.slice(1).toLowerCase()} ${lname.charAt(0).toUpperCase() + lname.slice(1).toLowerCase()}`;

  fetch("https://hook.eu1.make.com/pdz3obto9me2epspeq6iyq3yfjh5o1ou?event=shanghai&action=check-out&day=1", {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      fname,
      lname,
      source: auto ? "staff-auto" : "staff-manual",
      timestamp: new Date().toISOString()
    })
  }).then(() => {
    document.body.innerHTML = `<h1 style="text-align:center; color:green; font-family:Arial, sans-serif;">${name} check-out recorded successfully!</h1>`;
    // auto-close after 1.5s
    if (auto) setTimeout(() => window.close(), 1500);
  }).catch(() => alert("Error sending data"));
}

// --- Prefill + Auto-submit ---
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const fname = params.get("prefill_fname");
  const lname = params.get("prefill_lname");
  const auto = params.get("auto");

  if (fname) document.getElementById("fname").value = fname;
  if (lname) document.getElementById("lname").value = lname;

  // Auto-submit if auto=true and both names exist
  if (auto === "true" && fname && lname) {
    // use setTimeout to ensure everything is ready
    setTimeout(() => sendData(true), 100);
  }
});
</script>
